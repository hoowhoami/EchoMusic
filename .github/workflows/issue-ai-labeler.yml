name: AI Issue Labeler
on:
  issues:
    types: [opened, edited]

jobs:
  ai-check:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
      models: read # 必须加，使用官方AI

    steps:
      - name: AI 审核 Issue (GitHub Models 免费)
        id: ai_judge
        env:
          TITLE: ${{ github.event.issue.title }}
          BODY: ${{ github.event.issue.body }}
        run: |
          sudo apt-get install -y jq

          echo "🔍 标题：$TITLE"
          echo "📝 内容长度：${#BODY}"

          # 安全构造请求（不会JSON错误）
          JSON=$(jq -n \
            --arg t "$TITLE" \
            --arg b "$BODY" \
            '{
              "model": "deepseek-ai/DeepSeek-R1-1.5B-Instruct",
              "messages": [{
                "role": "user",
                "content": "你是Issue审核员。规则：Bug必须有问题描述、复现步骤、环境信息；功能需求要有说明。空内容、灌水、太短返回INVALID，合规返回VALID。只输出这两个单词。标题：\($t) 内容：\($b)"
              }],
              "temperature": 0
            }')

          # 调用 GitHub 官方免费AI
          RESP=$(curl -s https://models.github.ai/inference/v1/chat/completions \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Content-Type: application/json" \
            -d "$JSON")

          echo "📩 AI返回：$RESP"
          RESULT=$(echo "$RESP" | jq -r '.choices[0].message.content' | xargs 2>/dev/null)
          echo "✅ 最终结果：$RESULT"
          echo "response=$RESULT" >> $GITHUB_OUTPUT

      - name: 标记无效标签
        if: contains(steps.ai_judge.outputs.response, 'INVALID')
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['invalid']
            });
