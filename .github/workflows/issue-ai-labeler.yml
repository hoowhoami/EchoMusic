name: AI Issue Labeler
on:
  issues:
    types: [opened, edited]

jobs:
  ai-check:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: AI Judge
        id: ai_judge
        uses: flixlix/ai-model-inference@v1
        with:
          model: llama3-8b
          prompt: |
            你是一个开源项目的 Issue 审核助手。请根据以下标准判定 Issue 是否【合规】：

            1. **结构完整性**：
               - 如果是 Bug 报告，必须包含：【问题描述】、【复现步骤】和【环境信息】。
               - 如果是功能请求，必须包含：【功能概述】和【期望的行为】。
            2. **内容有效性**：
               - 禁止空模板提交（即只保留了标题，内容全是模板默认的占位符）。
               - 禁止无意义内容（如“不能用”、“救命”、“？？？”等）。
            3. **文明交流**：禁止广告、恶意灌水或攻击性言论。

            如果 Issue 严重缺少上述必要信息或属于灌水，返回：INVALID
            如果 Issue 信息基本完整且描述清晰，返回：VALID
            严禁返回任何其他文字。

            标题：${{ github.event.issue.title }}
            正文：${{ github.event.issue.body }}

      - name: Add Invalid Label
        if: contains(steps.ai_judge.outputs.response, 'INVALID')
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['invalid']
            });
