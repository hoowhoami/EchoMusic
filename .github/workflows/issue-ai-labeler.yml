name: AI Issue Labeler
on:
  issues:
    types: [opened, edited]

jobs:
  ai-check:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: AI Judge with DeepSeek
        id: ai_judge
        env:
          API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TITLE: ${{ toJson(github.event.issue.title) }}
          BODY: ${{ toJson(github.event.issue.body) }}
        run: |
          sudo apt-get install -y jq

          # 安全构造请求，避免 JSON 转义错误
          json=$(jq -n \
            --arg title "$TITLE" \
            --arg body "$BODY" \
            '{
              "model": "deepseek-chat",
              "messages": [{
                "role": "user",
                "content": "判断Issue是否合规。规则：Bug需要问题描述、复现步骤、环境信息；功能请求需要功能概述、期望行为。空内容、无意义、灌水返回INVALID，合规返回VALID，只输出这两个单词。标题：\($title)，正文：\($body)"
              }],
              "temperature": 0
            }')

          # 调用 API
          res=$(curl -s https://api.deepseek.com/v1/chat/completions \
            -H "Authorization: Bearer $API_KEY" \
            -H "Content-Type: application/json" \
            -d "$json")

          # 安全提取结果
          result=$(echo "$res" | jq -r '.choices[0].message.content | gsub("^\\s+|\\s+$"; "")' 2>/dev/null || echo "VALID")
          echo "response=$result" >> $GITHUB_OUTPUT
          echo "Result: $result"

      - name: Add Invalid Label
        if: contains(steps.ai_judge.outputs.response, 'INVALID')
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['invalid']
            });
