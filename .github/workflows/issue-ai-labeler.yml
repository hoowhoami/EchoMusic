name: AI Issue Labeler
on:
  issues:
    types: [opened, edited]

jobs:
  ai-check:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Validate Issue with DeepSeek AI
        id: ai_judge
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # 安装 jq
          sudo apt-get install -y jq
          
          # 构造请求
          response=$(curl -s https://api.deepseek.com/v1/chat/completions \
            -H "Authorization: Bearer $DEEPSEEK_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "deepseek-chat",
              "messages": [
                {
                  "role": "user",
                  "content": "'"你是一个开源项目的 Issue 审核助手。请根据以下标准判定 Issue 是否【合规】：

1. **结构完整性**：
   - 如果是 Bug 报告，必须包含：【问题描述】、【复现步骤】和【环境信息】。
   - 如果是功能请求，必须包含：【功能概述】和【期望的行为】。
2. **内容有效性**：
   - 禁止空模板提交（即只保留了标题，内容全是模板默认的占位符）。
   - 禁止无意义内容（如“不能用”、“救命”、“？？？”等）。
3. **文明交流**：禁止广告、恶意灌水或攻击性言论。

如果 Issue 严重缺少上述必要信息或属于灌水，返回：INVALID
如果 Issue 信息基本完整且描述清晰，返回：VALID
严禁返回任何其他文字。

标题：'"$ISSUE_TITLE"'
正文：'"$ISSUE_BODY"'"
                }
              ],
              "temperature": 0.0
            }')

          # 提取结果
          result=$(echo "$response" | jq -r '.choices[0].message.content' | xargs)
          echo "response=$result" >> $GITHUB_OUTPUT

      - name: Add Invalid Label
        if: contains(steps.ai_judge.outputs.response, 'INVALID')
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.reo,
              issue_number: context.issue.number,
              labels: ['invalid']
            });