name: AI Issue Labeler
on:
  issues:
    types: [opened, edited]

jobs:
  ai-check:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: AI Judge
        id: ai_judge
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          sudo apt-get install -y jq

          PROMPT="你是一个开源项目的 Issue 审核助手。请根据以下标准判定 Issue 是否【合规】：

          1. 结构完整性：
            - 如果是 Bug 报告，必须包含：【问题描述】、【复现步骤】和【环境信息】。
            - 如果是功能请求，必须包含：【功能概述】和【期望的行为】。
          2. 内容有效性：
            - 禁止空模板提交。
            - 禁止无意义内容（不能用、救命、??? 等）。
          3. 禁止广告、恶意灌水。

          不合规返回：INVALID
          合规返回：VALID
          严禁返回其他文字。

          标题：$ISSUE_TITLE
          正文：$ISSUE_BODY"

          # 构造请求
          JSON=$(jq -n \
            --arg prompt "$PROMPT" \
            '{
              "contents": [
                {
                  "parts": [
                    {
                      "text": $prompt
                    }
                  ]
                }
              ]
            }')

          API_URL="https://x666.me/v1beta/models/gemini-3-flash-preview:generateContent"

          # 调用 Gemini
          RESPONSE=$(curl -s "$API_URL?key=$GEMINI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$JSON")

          echo "AI 返回原始内容：$RESPONSE"

          # 提取结果
          RESULT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text' | xargs 2>/dev/null)
          echo "AI 判定结果：$RESULT"
          echo "response=$RESULT" >> $GITHUB_OUTPUT

      - name: Add Invalid Label
        if: contains(steps.ai_judge.outputs.response, 'INVALID')
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['invalid']
            });
