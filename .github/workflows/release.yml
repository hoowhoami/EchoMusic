name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - os: macos-latest
            build_script: npm run build:all
          - os: ubuntu-latest
            build_script: npm run build:all:linux
          - os: windows-latest
            build_script: npm run build:all:win

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies with retry
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_on: error
          command: npm install

      - name: Install server dependencies
        run: cd server && pnpm install

      - name: Build server and app
        run: ${{ matrix.build_script }}

      - name: Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        timeout-minutes: 30
        run: npx electron-builder --publish=always

  publish-release:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Publish GitHub Release
        run: |
          # 获取 tag 名称
          TAG_NAME=${GITHUB_REF#refs/tags/}
          # 使用 gh CLI 将 draft release 发布为正式版本
          gh release edit $TAG_NAME --draft=false --prerelease=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
