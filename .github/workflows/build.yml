name: Build EchoMusic Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    timeout-minutes: 120
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            rust_target: aarch64-apple-darwin
            ffmpeg_features: bundled-ffmpeg
            electron_builder_args: '--mac --arm64'
            artifact_name: EchoMusic-macOS-arm64
            artifact_glob: |
              release/EchoMusic-*.zip
              release/EchoMusic-*.dmg
              release/latest-mac.yml
          - os: macos-13
            rust_target: x86_64-apple-darwin
            ffmpeg_features: bundled-ffmpeg
            electron_builder_args: '--mac --x64'
            artifact_name: EchoMusic-macOS-x64
            artifact_glob: |
              release/EchoMusic-*.zip
              release/EchoMusic-*.dmg
          - os: ubuntu-22.04
            rust_target: ''
            ffmpeg_features: bundled-ffmpeg
            electron_builder_args: '--linux --x64'
            artifact_name: EchoMusic-Linux-x64
            artifact_glob: |
              release/EchoMusic-*.AppImage
              release/EchoMusic-*.deb
              release/EchoMusic-*.rpm
              release/EchoMusic-*.tar.gz
              release/latest-linux.yml
          - os: ubuntu-22.04-arm
            rust_target: ''
            ffmpeg_features: bundled-ffmpeg
            electron_builder_args: '--linux --arm64'
            artifact_name: EchoMusic-Linux-arm64
            artifact_glob: |
              release/EchoMusic-*.AppImage
              release/EchoMusic-*.deb
              release/EchoMusic-*.rpm
              release/EchoMusic-*.tar.gz
              release/latest-linux-arm64.yml
          - os: windows-latest
            rust_target: ''
            vcpkg_triplet: x64-windows-static
            ffmpeg_features: static-ffmpeg
            electron_builder_args: '--win --x64'
            artifact_name: EchoMusic-Windows-x64
            artifact_glob: |
              release/EchoMusic-*-Windows-Setup-x64.exe
              release/latest.yml
          - os: windows-latest
            rust_target: aarch64-pc-windows-msvc
            vcpkg_triplet: arm64-windows-static
            ffmpeg_features: static-ffmpeg
            electron_builder_args: '--win --arm64'
            artifact_name: EchoMusic-Windows-arm64
            artifact_glob: |
              release/EchoMusic-*-Windows-Setup-arm64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.rust_target != ''
        run: rustup target add ${{ matrix.rust_target }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            libasound2-dev \
            libgtk-3-dev \
            libnotify-dev \
            libnss3 \
            libssl-dev \
            libxss1 \
            libxtst6 \
            nasm \
            pkg-config \
            xdg-utils \
            yasm \
            zlib1g-dev
          echo "OPENSSL_DIR=/usr" >> "$GITHUB_ENV"
          echo "OPENSSL_LIB_DIR=/usr/lib/x86_64-linux-gnu" >> "$GITHUB_ENV"
          echo "OPENSSL_INCLUDE_DIR=/usr/include" >> "$GITHUB_ENV"

      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install nasm openssl@3 pkg-config yasm zlib
          echo "OPENSSL_DIR=$(brew --prefix openssl@3)" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=$(brew --prefix openssl@3)/lib/pkgconfig:$(brew --prefix zlib)/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> "$GITHUB_ENV"

      - name: Install Windows static FFmpeg
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT
          if (-not $vcpkgRoot) {
            $vcpkgRoot = 'C:\vcpkg'
          }
          & "$vcpkgRoot\vcpkg.exe" install "ffmpeg:${{ matrix.vcpkg_triplet }}"
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          "VCPKGRS_TRIPLET=${{ matrix.vcpkg_triplet }}" | Out-File -FilePath $env:GITHUB_ENV -Append
          "VCPKG_DEFAULT_TRIPLET=${{ matrix.vcpkg_triplet }}" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native media controls addon
        working-directory: native/echo-media-controls
        shell: bash
        run: |
          npm install --no-audit --no-fund
          if [ -n "${{ matrix.rust_target }}" ]; then
            npx napi build --release --no-const-enum --target ${{ matrix.rust_target }}
          else
            npx napi build --release --no-const-enum
          fi

      - name: Build native ffmpeg player addon
        working-directory: native/echo-ffmpeg-player
        shell: bash
        env:
          FFMPEG_PLAYER_FEATURES: ${{ matrix.ffmpeg_features }}
        run: |
          npm install --no-audit --no-fund
          if [ -n "${{ matrix.rust_target }}" ]; then
            npx napi build --release --no-const-enum --target ${{ matrix.rust_target }} --features "$FFMPEG_PLAYER_FEATURES"
          else
            npx napi build --release --no-const-enum --features "$FFMPEG_PLAYER_FEATURES"
          fi

      - name: Build native storage addon
        working-directory: native/echo-storage
        shell: bash
        run: |
          npm install --no-audit --no-fund
          if [ -n "${{ matrix.rust_target }}" ]; then
            npx napi build --release --no-const-enum --target ${{ matrix.rust_target }}
          else
            npx napi build --release --no-const-enum
          fi

      - name: Install server runtime dependencies
        working-directory: server
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci --omit=dev --no-audit --no-fund
          else
            npm install --omit=dev --no-audit --no-fund
          fi

      - name: Remove server test files
        working-directory: server
        shell: bash
        run: find module -name '*.test.js' -delete

      - name: Build desktop app
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          ELECTRON_BUILDER_BINARIES_MIRROR: https://github.com/electron-userland/electron-builder-binaries/releases/download/
        run: |
          pnpm exec vue-tsc --noEmit
          pnpm exec vite build
          pnpm exec electron-builder ${{ matrix.electron_builder_args }} --publish never

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish Release Assets
    timeout-minutes: 20
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: find release-artifacts -maxdepth 2 -type f | sort

      - name: Extract changelog for current version
        id: changelog
        shell: bash
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"
          HEADER=$(awk '/^## \[/ { exit } !/^# / { print }' CHANGELOG.md | sed '/^$/d')
          VERSION_BODY=$(awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) found=1
              next
            }
            found { print }
          ' CHANGELOG.md)

          if [ -n "$HEADER" ] && [ -n "$VERSION_BODY" ]; then
            BODY=$(printf '%s\n\n%s' "$HEADER" "$VERSION_BODY")
          elif [ -n "$VERSION_BODY" ]; then
            BODY="$VERSION_BODY"
          else
            BODY="详见 CHANGELOG.md"
          fi

          {
            echo "BODY<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**
          body: ${{ steps.changelog.outputs.BODY }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Send Telegram Notification
    if: startsWith(github.ref, 'refs/tags/') && success()
    needs:
      - build
      - release
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build changelog
        shell: bash
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"
          CHANGELOG=$(awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) found=1
              next
            }
            found && NF { print }
          ' CHANGELOG.md \
            | sed 's/^### /\n📌 /' \
            | sed 's/^- /• /' \
            | awk 'NR==1{printf "%s",$0;next}{printf "\n%s",$0}')

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="详见 CHANGELOG.md"
          fi

          {
            echo "CHANGELOG<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Build artifact links from release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY}"

          ASSETS=$(gh api "repos/${REPO}/releases/tags/${VERSION}" --jq '.assets[].name' 2>/dev/null || true)
          if [ -z "$ASSETS" ]; then
            echo "QQ_ARTIFACT_LINKS=无" >> "$GITHUB_ENV"
            exit 0
          fi

          LINKS=""
          while IFS= read -r filename; do
            link="https://github.com/${REPO}/releases/download/${VERSION}/${filename}"
            if [ -z "$LINKS" ]; then
              LINKS="• ${filename}\n  ${link}"
            else
              LINKS="${LINKS}\n• ${filename}\n  ${link}"
            fi
          done <<< "$ASSETS"

          {
            echo "QQ_ARTIFACT_LINKS<<EOF"
            printf '%b\n' "$LINKS"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Send Telegram message
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets are missing, skip Telegram notification."
            exit 0
          fi

          MESSAGE=$(cat <<EOF
          <b>EchoMusic ${GITHUB_REF_NAME} 已发布</b>

          ${CHANGELOG}

          <b>下载</b>
          ${ARTIFACT_LINKS}
          EOF
          )

          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "parse_mode=HTML" \
            --data-urlencode "text=${MESSAGE}"

      - name: Send QQ group message via OneBot API
        shell: bash
        env:
          QQ_BOT_API: ${{ secrets.QQ_BOT_API }}
          QQ_GROUP_ID: ${{ secrets.QQ_GROUP_ID }}
          QQ_BOT_TOKEN: ${{ secrets.QQ_BOT_TOKEN }}
        run: |
          set -e
          if [ -z "$QQ_BOT_API" ] || [ -z "$QQ_GROUP_ID" ]; then
            echo "QQ Bot secrets are missing, skip QQ notification."
            exit 0
          fi

          VERSION="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY}"

          MESSAGE=$(printf '🎉 EchoMusic %s 发布啦！\n\n📝 更新内容：\n%s\n\n📦 下载地址：\n%s\n\n🔗 查看完整 Release：https://github.com/%s/releases/tag/%s' \
            "$VERSION" "$CHANGELOG" "$QQ_ARTIFACT_LINKS" "$REPO" "$VERSION")

          HEADERS=(-H "Content-Type: application/json")
          if [ -n "$QQ_BOT_TOKEN" ]; then
            HEADERS+=(-H "Authorization: Bearer ${QQ_BOT_TOKEN}")
          fi

          PAYLOAD=$(jq -n \
            --arg group_id "$QQ_GROUP_ID" \
            --arg message "$MESSAGE" \
            '{message_type: "group", group_id: $group_id, message: $message}')

          curl -sS -X POST "${QQ_BOT_API}/send_msg" \
            "${HEADERS[@]}" \
            -d "$PAYLOAD"
