name: Build EchoMusic Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: macos
            server_bin: app_macos
            pkg_target: node18-macos-x64
          - os: ubuntu-22.04
            platform: linux
            server_bin: app_linux
            pkg_target: node18-linux-x64
          - os: windows-latest
            platform: windows
            arch: x64
            flutter_target: windows-x64
            server_bin: app_win.exe
            pkg_target: node18-win-x64
          - os: windows-latest
            platform: windows
            arch: arm64
            flutter_target: windows-arm64
            server_bin: app_win.exe
            pkg_target: node18-win-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node_version: '18'

      - name: Install Server Dependencies and Build Server Executable
        run: |
          cd server
          npm install
          npx pkg . -t ${{ matrix.pkg_target }} -o bin/${{ matrix.server_bin }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev liblzma-dev libsecret-1-dev libjsoncpp-dev libayatana-appindicator3-dev libmpv-dev libkeybinder-3.0-dev mpv

      - name: Build Flutter Desktop (Windows)
        if: matrix.platform == 'windows'
        run: flutter build windows --release --target-platform=${{ matrix.flutter_target }}

      - name: Build Flutter Desktop (Non-Windows)
        if: matrix.platform != 'windows'
        run: flutter build ${{ matrix.platform }} --release

      - name: Bundle Server (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          mkdir -p build/macos/Build/Products/Release/EchoMusic.app/Contents/Resources/server
          cp server/bin/app_macos build/macos/Build/Products/Release/EchoMusic.app/Contents/Resources/server/

      - name: Bundle Server (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          mkdir -p build/windows/${{ matrix.arch }}/runner/Release/server
          cp server/bin/app_win.exe build/windows/${{ matrix.arch }}/runner/Release/server/

      - name: Bundle Server (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          mkdir -p build/linux/x64/release/bundle/server
          cp server/bin/app_linux build/linux/x64/release/bundle/server/

      - name: Set AppImage version (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          echo "APPIMAGE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Verify Build Artifacts
        shell: bash
        run: |
          echo "Listing build artifacts..."
          if [ "${{ matrix.platform }}" == "macos" ]; then
            ls -lhR build/macos/Build/Products/Release/EchoMusic.app/Contents/Resources/server/
          elif [ "${{ matrix.platform }}" == "windows" ]; then
            ls -lhR build/windows/${{ matrix.arch }}/runner/Release/server/
          elif [ "${{ matrix.platform }}" == "linux" ]; then
            ls -lhR build/linux/x64/release/bundle/server/
          fi

      - name: Install create-dmg (macOS)
        if: matrix.platform == 'macos'
        run: brew install create-dmg

      - name: Prepare Release (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          VERSION=${{ github.ref_name }}
          CLEAN_VERSION=${VERSION#v}
          mkdir -p dmg_root
          cp -r "build/macos/Build/Products/Release/EchoMusic.app" dmg_root/

          create-dmg \
            --volname "EchoMusic" \
            --volicon "dmg_root/EchoMusic.app/Contents/Resources/AppIcon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "EchoMusic.app" 175 120 \
            --hide-extension "EchoMusic.app" \
            --app-drop-link 425 120 \
            "${{ github.workspace }}/EchoMusic-${CLEAN_VERSION}-macOS.dmg" \
            dmg_root/

      - name: Prepare Release (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          VERSION=${{ github.ref_name }}
          CLEAN_VERSION=${VERSION#v}
          iscc //DAppVersion=${CLEAN_VERSION} //DAppArch=${{ matrix.arch }} //DBuildDir=build\\windows\\${{ matrix.arch }}\\runner\\Release installer.iss
          mv EchoMusic-Windows-Setup-${{ matrix.arch }}.exe "${{ github.workspace }}/EchoMusic-${CLEAN_VERSION}-Windows-Setup-${{ matrix.arch }}.exe"

      - name: Prepare Release (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          VERSION=${{ github.ref_name }}
          CLEAN_VERSION=${VERSION#v}
          # Create .deb package structure
          mkdir -p deb/usr/bin
          mkdir -p deb/usr/share/echomusic
          mkdir -p deb/usr/share/applications
          mkdir -p deb/usr/share/icons/hicolor/512x512/apps
          mkdir -p deb/DEBIAN

          cp -r build/linux/x64/release/bundle/* deb/usr/share/echomusic/
          ln -s /usr/share/echomusic/EchoMusic deb/usr/bin/echomusic
          cp assets/icons/icon.png deb/usr/share/icons/hicolor/512x512/apps/echomusic.png

          cat > deb/DEBIAN/control <<EOF
          Package: echomusic
          Version: ${CLEAN_VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: EchoMusic Team
          Depends: libgtk-3-0, libsecret-1-0, libjsoncpp25, libayatana-appindicator3-1, libmpv1, libkeybinder-3.0-0
          Description: A minimalist music player.
          EOF

          cat > deb/usr/share/applications/echomusic.desktop <<EOF
          [Desktop Entry]
          Name=EchoMusic
          Exec=echomusic
          Icon=echomusic
          Type=Application
          Categories=AudioVideo;Audio;Player;
          EOF

          dpkg-deb --build deb "${{ github.workspace }}/EchoMusic-${CLEAN_VERSION}-Linux.deb"

      - name: Build AppImage (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        env:
          APPIMAGE_VERSION: ${{ env.APPIMAGE_VERSION }}
        run: |
          docker run --rm \
            -e APPIMAGE_VERSION \
            -v "${{ github.workspace }}:/github/workspace" \
            -w /github/workspace \
            --entrypoint /bin/sh \
            appimagecrafters/appimage-builder:1.1.0 \
            -lc 'apt-get update && apt-get install -y squashfs-tools && appimage-builder --recipe AppImageBuilder.yml --skip-test'

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            EchoMusic-*.dmg
            EchoMusic-*-Windows-Setup-*.exe
            EchoMusic-*.deb
            EchoMusic-*.AppImage
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
