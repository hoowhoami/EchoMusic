name: Build EchoMusic Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: macos
            server_bin: app_macos
            pkg_target: node18-macos-x64
            pkg_script: pkgmacos
          - os: ubuntu-22.04
            platform: linux
            server_bin: app_linux
            pkg_target: node18-linux-x64
            pkg_script: pkglinux
          - os: windows-latest
            platform: windows
            arch: x64
            server_bin: app_win.exe
            pkg_target: node18-win-x64
            pkg_script: pkgwin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Server Dependencies and Build Server Executable
        working-directory: server
        run: |
          npm install
          npx pkg . -t ${{ matrix.pkg_target }} -C GZip -o bin/${{ matrix.server_bin }} --no-bytecode

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev liblzma-dev libsecret-1-dev libjsoncpp-dev libayatana-appindicator3-dev libmpv-dev libkeybinder-3.0-dev mpv

      - name: Build Flutter Desktop (Windows)
        if: matrix.platform == 'windows'
        run: flutter build windows --release

      - name: Build Flutter Desktop (Non-Windows)
        if: matrix.platform != 'windows'
        run: flutter build ${{ matrix.platform }} --release

      - name: Bundle Server (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          mkdir -p build/macos/Build/Products/Release/EchoMusic.app/Contents/Resources/server
          cp server/bin/app_macos build/macos/Build/Products/Release/EchoMusic.app/Contents/Resources/server/

      - name: Bundle Server (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          mkdir -p build/windows/${{ matrix.arch }}/runner/Release/server
          cp server/bin/app_win.exe build/windows/${{ matrix.arch }}/runner/Release/server/

      - name: Bundle Server (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          mkdir -p build/linux/x64/release/bundle/server
          cp server/bin/app_linux build/linux/x64/release/bundle/server/

      - name: Set AppImage version (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          echo "APPIMAGE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Verify Build Artifacts
        shell: bash
        run: |
          echo "Listing build artifacts..."
          if [ "${{ matrix.platform }}" == "macos" ]; then
            ls -lhR build/macos/Build/Products/Release/EchoMusic.app/Contents/Resources/server/
          elif [ "${{ matrix.platform }}" == "windows" ]; then
            ls -lhR build/windows/${{ matrix.arch }}/runner/Release/server/
          elif [ "${{ matrix.platform }}" == "linux" ]; then
            ls -lhR build/linux/x64/release/bundle/server/
          fi

      - name: Install create-dmg (macOS)
        if: matrix.platform == 'macos'
        run: brew install create-dmg

      - name: Prepare Release (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          VERSION=${{ github.ref_name }}
          CLEAN_VERSION=${VERSION#v}
          mkdir -p dmg_root
          cp -r "build/macos/Build/Products/Release/EchoMusic.app" dmg_root/

          create-dmg \
            --volname "EchoMusic" \
            --volicon "dmg_root/EchoMusic.app/Contents/Resources/AppIcon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "EchoMusic.app" 175 120 \
            --hide-extension "EchoMusic.app" \
            --app-drop-link 425 120 \
            "${{ github.workspace }}/EchoMusic-${CLEAN_VERSION}-macOS.dmg" \
            dmg_root/

      - name: Prepare Release (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          VERSION=${{ github.ref_name }}
          CLEAN_VERSION=${VERSION#v}
          iscc //DAppVersion=${CLEAN_VERSION} //DAppArch=${{ matrix.arch }} //DBuildDir=build\\windows\\${{ matrix.arch }}\\runner\\Release installer.iss
          mv EchoMusic-Windows-Setup-${{ matrix.arch }}.exe "${{ github.workspace }}/EchoMusic-${CLEAN_VERSION}-Windows-Setup-${{ matrix.arch }}.exe"

      - name: Prepare Release (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          VERSION=${{ github.ref_name }}
          CLEAN_VERSION=${VERSION#v}
          # Create .deb package structure
          mkdir -p deb/usr/bin
          mkdir -p deb/usr/share/echomusic
          mkdir -p deb/usr/share/applications
          mkdir -p deb/usr/share/icons/hicolor/512x512/apps
          mkdir -p deb/DEBIAN

          cp -r build/linux/x64/release/bundle/* deb/usr/share/echomusic/
          ln -s /usr/share/echomusic/EchoMusic deb/usr/bin/echomusic
          cp assets/icons/icon.png deb/usr/share/icons/hicolor/512x512/apps/echomusic.png

          cat > deb/DEBIAN/control <<EOF
          Package: echomusic
          Version: ${CLEAN_VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: EchoMusic Team
          Depends: libgtk-3-0, libsecret-1-0, libjsoncpp25, libayatana-appindicator3-1, libmpv1, libkeybinder-3.0-0
          Description: A minimalist music player.
          EOF

          cat > deb/usr/share/applications/echomusic.desktop <<EOF
          [Desktop Entry]
          Name=EchoMusic
          Exec=echomusic
          Icon=echomusic
          Type=Application
          Categories=AudioVideo;Audio;Player;
          EOF

          dpkg-deb --build deb "${{ github.workspace }}/EchoMusic-${CLEAN_VERSION}-Linux.deb"

      - name: Build AppImage (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        env:
          APPIMAGE_VERSION: ${{ env.APPIMAGE_VERSION }}
        run: |
          docker run --rm \
            -e APPIMAGE_VERSION \
            -v "${{ github.workspace }}:/github/workspace" \
            -w /github/workspace \
            --entrypoint /bin/sh \
            appimagecrafters/appimage-builder:1.1.0 \
            -lc 'apt-get update && apt-get install -y squashfs-tools && appimage-builder --recipe AppImageBuilder.yml --skip-test'

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            EchoMusic-*.dmg
            EchoMusic-*-Windows-Setup-*.exe
            EchoMusic-*.deb
            EchoMusic-*.AppImage
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Send Telegram Notification
    needs: build
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build changelog
        shell: bash
        run: |
          set -e
          git fetch --tags --force
          PREV_TAG=$(git describe --tags --abbrev=0 "${GITHUB_SHA}^" 2>/dev/null || true)
          if [ -n "$PREV_TAG" ]; then
            RANGE="$PREV_TAG..${GITHUB_SHA}"
          else
            RANGE="${GITHUB_SHA}"
          fi

          CHANGELOG=$(git log "$RANGE" --pretty=format:"• %s" \
            | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g; s/"/\&quot;/g' \
            | awk 'NR==1{printf "%s",$0;next}{printf "\n%s",$0}')
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="无"
          fi

          {
            echo "CHANGELOG<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Send Build Success Message
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_TOPIC_ID: ${{ secrets.TELEGRAM_TOPIC_ID }}
        run: |
          VERSION="${{ github.ref_name }}"
          CLEAN_VERSION="${VERSION#v}"
          REPO="${{ github.repository }}"

          printf -v MESSAGE '%s\n\n%s\n%s\n\n%s\n%s\n%s\n%s\n%s\n\n%s' \
            "🎉 <b>EchoMusic ${VERSION} 构建成功！</b>" \
            "📝 <b>更新内容：</b>" \
            "${CHANGELOG}" \
            "📦 <b>下载地址：</b>" \
            "🍎 macOS: <a href=\"https://github.com/${REPO}/releases/download/${VERSION}/EchoMusic-${CLEAN_VERSION}-macOS.dmg\">EchoMusic-${CLEAN_VERSION}-macOS.dmg</a>" \
            "🪟 Windows: <a href=\"https://github.com/${REPO}/releases/download/${VERSION}/EchoMusic-${CLEAN_VERSION}-Windows-Setup-x64.exe\">EchoMusic-${CLEAN_VERSION}-Windows-Setup-x64.exe</a>" \
            "🐧 Linux (deb): <a href=\"https://github.com/${REPO}/releases/download/${VERSION}/EchoMusic-${CLEAN_VERSION}-Linux.deb\">EchoMusic-${CLEAN_VERSION}-Linux.deb</a>" \
            "🐧 Linux (AppImage): <a href=\"https://github.com/${REPO}/releases/download/${VERSION}/EchoMusic-${CLEAN_VERSION}-x86_64.AppImage\">EchoMusic-${CLEAN_VERSION}-x86_64.AppImage</a>" \
            "🔗 <a href=\"https://github.com/${REPO}/releases/tag/${VERSION}\">查看完整 Release</a>"

          CURL_CMD="curl -s -X POST \"https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage\" \
            -d chat_id=\"${TELEGRAM_CHAT_ID}\" \
            -d text=\"${MESSAGE}\" \
            -d parse_mode=\"HTML\" \
            -d disable_web_page_preview=true"

          # 如果设置了 TELEGRAM_TOPIC_ID，则添加 message_thread_id 参数
          if [ -n "${TELEGRAM_TOPIC_ID}" ]; then
            CURL_CMD="${CURL_CMD} -d message_thread_id=\"${TELEGRAM_TOPIC_ID}\""
          fi

          eval $CURL_CMD
