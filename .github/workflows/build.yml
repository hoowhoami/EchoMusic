name: Build EchoMusic Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    timeout-minutes: 90
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            rust_target: aarch64-apple-darwin
            electron_builder_args: '--mac --arm64'
            artifact_name: EchoMusic-macOS-arm64
            artifact_glob: |
              release/EchoMusic-*.zip
              release/EchoMusic-*.dmg
              release/latest-mac.yml
          - os: macos-14
            rust_target: x86_64-apple-darwin
            electron_builder_args: '--mac --x64'
            artifact_name: EchoMusic-macOS-x64
            artifact_glob: |
              release/EchoMusic-*.zip
              release/EchoMusic-*.dmg
          - os: ubuntu-22.04
            rust_target: ''
            electron_builder_args: ''
            artifact_name: EchoMusic-Linux-x64
            artifact_glob: |
              release/EchoMusic-*.AppImage
              release/EchoMusic-*.deb
              release/EchoMusic-*.pkg.tar.zst
              release/EchoMusic-*.rpm
              release/EchoMusic-*.tar.gz
              release/latest-linux.yml
          - os: ubuntu-22.04-arm
            rust_target: ''
            electron_builder_args: '--linux --arm64'
            artifact_name: EchoMusic-Linux-arm64
            artifact_glob: |
              release/EchoMusic-*.AppImage
              release/EchoMusic-*.deb
              release/EchoMusic-*.pkg.tar.zst
              release/EchoMusic-*.rpm
              release/EchoMusic-*.tar.gz
              release/latest-linux-arm64.yml
          - os: windows-latest
            rust_target: ''
            electron_builder_args: '--win --x64'
            artifact_name: EchoMusic-Windows-x64
            artifact_glob: |
              release/EchoMusic-*-Windows-Setup-x64.exe
              release/latest.yml
          - os: windows-11-arm
            rust_target: ''
            electron_builder_args: '--win --arm64'
            artifact_name: EchoMusic-Windows-arm64
            artifact_glob: |
              release/EchoMusic-*-Windows-Setup-arm64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools libasound2-dev libgtk-3-dev libnotify-dev libnss3 libxss1 libxtst6 xdg-utils

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust cross-compile target
        if: matrix.rust_target != ''
        run: rustup target add ${{ matrix.rust_target }}

      - name: Build native media controls addon
        working-directory: native/echo-media-controls
        shell: bash
        run: |
          npm install
          if [ -n "${{ matrix.rust_target }}" ]; then
            npx napi build --release --no-const-enum --target ${{ matrix.rust_target }}
          else
            npm run build
          fi

      - name: Build native ffmpeg player addon
        working-directory: native/echo-ffmpeg-player
        shell: bash
        run: |
          npm install
          if [ -n "${{ matrix.rust_target }}" ]; then
            npx napi build --release --no-const-enum --target ${{ matrix.rust_target }}
          else
            npm run build
          fi

      - name: Verify macOS ffmpeg player linkage
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -e
          addon="native/echo-ffmpeg-player/echo-ffmpeg-player.node"
          if [ ! -f "$addon" ]; then
            echo "ERROR: ffmpeg player addon not found: $addon"
            exit 1
          fi

          otool -L "$addon" | tee /tmp/echo-ffmpeg-player-otool.txt
          if grep -E 'lib(avcodec|avformat|avutil|swresample|mpv).*\.(dylib|so)' /tmp/echo-ffmpeg-player-otool.txt; then
            echo "ERROR: ffmpeg player addon unexpectedly links to system FFmpeg/mpv libraries"
            exit 1
          fi

      - name: Build native SQLite store addon
        working-directory: native/echo-sqlite-store
        shell: bash
        run: |
          npm install
          if [ -n "${{ matrix.rust_target }}" ]; then
            npx napi build --release --no-const-enum --target ${{ matrix.rust_target }}
          else
            npm run build
          fi

      - name: Verify Linux ffmpeg player linkage
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -e
          addon="native/echo-ffmpeg-player/echo-ffmpeg-player.node"
          if [ ! -f "$addon" ]; then
            echo "ERROR: ffmpeg player addon not found: $addon"
            exit 1
          fi

          ldd "$addon" | tee /tmp/echo-ffmpeg-player-ldd.txt
          if grep -E 'lib(avcodec|avformat|avutil|swresample|mpv)\.so' /tmp/echo-ffmpeg-player-ldd.txt; then
            echo "ERROR: ffmpeg player addon unexpectedly links to system FFmpeg/mpv libraries"
            exit 1
          fi

      - name: Install server runtime dependencies
        working-directory: server
        shell: bash
        run: |
          # server 是外部子模块，其 package-lock.json 常与 package.json 不同步，
          # 且 devDependencies(tsdown) 与 typescript@4.x 存在 peer 冲突。
          # 运行时只需 --omit=dev 的依赖，故统一用 npm install + --legacy-peer-deps。
          npm install --omit=dev --no-audit --no-fund --legacy-peer-deps

      - name: Remove server test files
        working-directory: server
        shell: bash
        run: find module -name '*.test.js' -delete

      - name: Build desktop app
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          ELECTRON_BUILDER_BINARIES_MIRROR: https://github.com/electron-userland/electron-builder-binaries/releases/download/
        run: |
          pnpm exec vue-tsc --noEmit && pnpm exec vite build
          pnpm exec electron-builder ${{ matrix.electron_builder_args }} --publish never

      - name: Verify packaged native addons
        shell: bash
        run: |
          set -e
          for addon in echo-media-controls echo-ffmpeg-player echo-sqlite-store; do
            matches=$(find release \( \
              -path "*/resources/native/${addon}.node" -o \
              -path "*/Contents/Resources/native/${addon}.node" \
            \) -type f -print)
            if [ -z "$matches" ]; then
              echo "ERROR: packaged native addon not found: ${addon}.node"
              find release -maxdepth 4 -type f -name '*.node' -print
              exit 1
            fi
            printf 'Packaged native addon found: %s\n' "$matches"
          done

      - name: Normalize and verify Arch Linux package
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -e
          shopt -s nullglob
          for package_path in release/EchoMusic-*.pacman; do
            mv "$package_path" "${package_path%.pacman}.pkg.tar.zst"
          done

          packages=(release/EchoMusic-*.pkg.tar.zst)
          if [ ${#packages[@]} -eq 0 ]; then
            echo "ERROR: Arch package artifact was not generated"
            find release -maxdepth 2 -type f -print
            exit 1
          fi

          for package_path in "${packages[@]}"; do
            pkginfo="$(mktemp)"
            bsdtar -xOf "$package_path" .PKGINFO > "$pkginfo"
            if grep -Eq '^depend = (http-parser|ffmpeg|mpv)([<>= ].*)?$' "$pkginfo"; then
              echo "ERROR: unexpected Arch dependency in $package_path"
              grep -E '^depend = (http-parser|ffmpeg|mpv)([<>= ].*)?$' "$pkginfo"
              exit 1
            fi
            if ! grep -Eq '^depend = alsa-lib([<>= ].*)?$' "$pkginfo"; then
              echo "ERROR: Arch package is missing alsa-lib runtime dependency"
              exit 1
            fi
            echo "Verified Arch package metadata: $package_path"
          done

      - name: Verify bundled Windows executable
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -e

          if [ "${{ runner.arch }}" = "ARM64" ]; then
            app_exe="release/win-arm64-unpacked/EchoMusic.exe"
          else
            app_exe="release/win-unpacked/EchoMusic.exe"
          fi

          if [ ! -f "$app_exe" ]; then
            echo "ERROR: bundled app executable not found: $app_exe"
            echo "=== release directories ==="
            find release -maxdepth 2 -type d -print
            echo "=== executable files ==="
            find release -maxdepth 3 -type f -name '*.exe' -print
            exit 1
          fi

          echo "bundled app executable found: $app_exe"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish Release Assets
    timeout-minutes: 20
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: find release-artifacts -maxdepth 2 -type f | sort

      - name: Extract changelog for current version
        id: changelog
        shell: bash
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"
          # 提取顶部声明（## 之前的内容，去掉标题行）
          HEADER=$(awk '/^## \[/ { exit } !/^# / { print }' CHANGELOG.md | sed '/^$/d')
          # 提取对应版本的内容
          VERSION_BODY=$(awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) found=1
              next
            }
            found { print }
          ' CHANGELOG.md)

          if [ -n "$HEADER" ] && [ -n "$VERSION_BODY" ]; then
            BODY=$(printf '%s\n\n%s' "$HEADER" "$VERSION_BODY")
          elif [ -n "$VERSION_BODY" ]; then
            BODY="$VERSION_BODY"
          else
            BODY="详见 CHANGELOG.md"
          fi

          {
            echo "BODY<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**
          body: ${{ steps.changelog.outputs.BODY }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Send Telegram Notification
    if: startsWith(github.ref, 'refs/tags/') && success()
    needs:
      - build
      - release
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build changelog
        shell: bash
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"
          CHANGELOG=$(awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) found=1
              next
            }
            found && NF { print }
          ' CHANGELOG.md \
            | sed 's/^### /\n📌 /' \
            | sed 's/^- /• /' \
            | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g; s/"/\&quot;/g' \
            | awk 'NR==1{printf "%s",$0;next}{printf "\n%s",$0}')

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="详见 CHANGELOG.md"
          fi

          {
            echo "CHANGELOG<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Build artifact links from release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY}"

          ASSETS=$(gh api "repos/${REPO}/releases/tags/${VERSION}" --jq '.assets[].name' 2>/dev/null || true)
          if [ -z "$ASSETS" ]; then
            echo "ARTIFACT_LINKS=无" >> "$GITHUB_ENV"
            exit 0
          fi

          LINKS=""
          while IFS= read -r filename; do
            escaped_name=$(printf '%s' "$filename" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g; s/"/\&quot;/g')
            link="https://github.com/${REPO}/releases/download/${VERSION}/${filename}"
            if [ -z "$LINKS" ]; then
              LINKS="• <a href=\"${link}\">${escaped_name}</a>"
            else
              LINKS="${LINKS}\n• <a href=\"${link}\">${escaped_name}</a>"
            fi
          done <<< "$ASSETS"

          {
            echo "ARTIFACT_LINKS<<EOF"
            printf '%b\n' "$LINKS"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Send Telegram message
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_TOPIC_ID: ${{ secrets.TELEGRAM_TOPIC_ID }}
        run: |
          set -e
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets are missing, skip notification."
            exit 0
          fi

          VERSION="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY}"

          printf -v MESSAGE '%s\n\n%s\n%s\n\n%s\n%s\n\n%s' \
            "🎉 <b>EchoMusic ${VERSION} 构建成功！</b>" \
            "📝 <b>更新内容：</b>" \
            "${CHANGELOG}" \
            "📦 <b>下载地址：</b>" \
            "${ARTIFACT_LINKS}" \
            "🔗 <a href=\"https://github.com/${REPO}/releases/tag/${VERSION}\">查看完整 Release</a>"

          PAYLOAD=$(jq -n \
            --arg chat_id "$TELEGRAM_CHAT_ID" \
            --arg text "$MESSAGE" \
            --arg parse_mode "HTML" \
            '{chat_id: $chat_id, text: $text, parse_mode: $parse_mode, disable_web_page_preview: true}')

          if [ -n "$TELEGRAM_TOPIC_ID" ]; then
            PAYLOAD=$(echo "$PAYLOAD" | jq --arg topic_id "$TELEGRAM_TOPIC_ID" '. + {message_thread_id: ($topic_id | tonumber)}')
          fi

          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

  notify-qq:
    name: Send QQ Group Notification
    if: startsWith(github.ref, 'refs/tags/') && success()
    needs:
      - build
      - release
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build changelog
        shell: bash
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"
          CHANGELOG=$(awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) found=1
              next
            }
            found && NF { print }
          ' CHANGELOG.md \
            | sed 's/^### /\n📌 /' \
            | sed 's/^- /• /' \
            | awk 'NR==1{printf "%s",$0;next}{printf "\n%s",$0}')

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="详见 CHANGELOG.md"
          fi

          {
            echo "CHANGELOG<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Build artifact links
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY}"

          ASSETS=$(gh api "repos/${REPO}/releases/tags/${VERSION}" --jq '.assets[].name' 2>/dev/null || true)
          if [ -z "$ASSETS" ]; then
            echo "QQ_ARTIFACT_LINKS=无" >> "$GITHUB_ENV"
            exit 0
          fi

          LINKS=""
          while IFS= read -r filename; do
            link="https://github.com/${REPO}/releases/download/${VERSION}/${filename}"
            if [ -z "$LINKS" ]; then
              LINKS="• ${filename}\n  ${link}"
            else
              LINKS="${LINKS}\n• ${filename}\n  ${link}"
            fi
          done <<< "$ASSETS"

          {
            echo "QQ_ARTIFACT_LINKS<<EOF"
            printf '%b\n' "$LINKS"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Send QQ group message via OneBot API
        shell: bash
        env:
          QQ_BOT_API: ${{ secrets.QQ_BOT_API }}
          QQ_GROUP_ID: ${{ secrets.QQ_GROUP_ID }}
          QQ_BOT_TOKEN: ${{ secrets.QQ_BOT_TOKEN }}
        run: |
          set -e
          if [ -z "$QQ_BOT_API" ] || [ -z "$QQ_GROUP_ID" ]; then
            echo "QQ Bot secrets are missing, skip QQ notification."
            exit 0
          fi

          VERSION="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY}"

          MESSAGE=$(printf '🎉 EchoMusic %s 发布啦！\n\n📝 更新内容：\n%s\n\n📦 下载地址：\n%s\n\n🔗 查看完整 Release：https://github.com/%s/releases/tag/%s' \
            "$VERSION" "$CHANGELOG" "$QQ_ARTIFACT_LINKS" "$REPO" "$VERSION")

          HEADERS=(-H "Content-Type: application/json")
          if [ -n "$QQ_BOT_TOKEN" ]; then
            HEADERS+=(-H "Authorization: Bearer ${QQ_BOT_TOKEN}")
          fi

          PAYLOAD=$(jq -n \
            --arg group_id "$QQ_GROUP_ID" \
            --arg message "$MESSAGE" \
            '{message_type: "group", group_id: $group_id, message: $message}')

          curl -sS -X POST "${QQ_BOT_API}/send_msg" \
            "${HEADERS[@]}" \
            -d "$PAYLOAD"
