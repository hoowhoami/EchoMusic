name: Build EchoMusic Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build for ${{ matrix.os }}
    timeout-minutes: 90
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            electron_builder_args: ''
            artifact_name: EchoMusic-macOS-arm64
            artifact_glob: |
              release/EchoMusic-*.dmg
              release/latest-mac.yml
          - os: macos-14
            electron_builder_args: '--mac --x64'
            artifact_name: EchoMusic-macOS-x64
            artifact_glob: |
              release/EchoMusic-*.dmg
          - os: ubuntu-22.04
            electron_builder_args: ''
            artifact_name: EchoMusic-Linux-x64
            artifact_glob: |
              release/EchoMusic-*.AppImage
              release/EchoMusic-*.deb
              release/EchoMusic-*.rpm
              release/EchoMusic-*.tar.gz
              release/latest-linux.yml
          - os: ubuntu-22.04-arm
            electron_builder_args: '--linux --arm64'
            artifact_name: EchoMusic-Linux-arm64
            artifact_glob: |
              release/EchoMusic-*.AppImage
              release/EchoMusic-*.deb
              release/EchoMusic-*.rpm
              release/EchoMusic-*.tar.gz
              release/latest-linux-arm64.yml
          - os: windows-latest
            electron_builder_args: ''
            artifact_name: EchoMusic-Windows
            artifact_glob: |
              release/EchoMusic-*-Windows-Setup-*.exe
              release/latest.yml

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libgtk-3-dev libnotify-dev libnss3 libxss1 libxtst6 xdg-utils

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Install server runtime dependencies
        working-directory: server
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci --omit=dev --no-audit --no-fund
          else
            npm install --omit=dev --no-audit --no-fund
          fi

      - name: Remove server test files
        working-directory: server
        shell: bash
        run: find module -name '*.test.js' -delete

      - name: Download mpv binary
        shell: bash
        run: |
          set -e
          mkdir -p build/mpv

          # 递归复制 dylib 依赖（macOS 专用）
          copy_dylibs_recursive() {
            local bin_or_lib="$1"
            local dest_dir="$2"
            local depth="${3:-0}"
            if [ "$depth" -gt 5 ]; then return; fi

            otool -L "$bin_or_lib" 2>/dev/null | awk '/\/opt\/homebrew|\/usr\/local/{print $1}' | while read -r lib; do
              local base_name
              base_name=$(basename "$lib")
              if [ -f "$dest_dir/$base_name" ]; then continue; fi
              if [ -f "$lib" ]; then
                cp "$lib" "$dest_dir/" 2>/dev/null || true
                # 递归处理这个 dylib 的依赖
                copy_dylibs_recursive "$dest_dir/$base_name" "$dest_dir" $((depth + 1))
              fi
            done
          }

          # 修复 macOS dylib 的加载路径，使用 @executable_path 相对路径
          # 避免依赖 DYLD_LIBRARY_PATH（会被 SIP 剥离）
          fix_macos_rpaths() {
            local mpv_bin="$1"
            local lib_dir="$2"

            # 修复 mpv 二进制中的 dylib 引用
            otool -L "$mpv_bin" | awk '/\/opt\/homebrew|\/usr\/local/{print $1}' | while read -r lib; do
              local base_name
              base_name=$(basename "$lib")
              if [ -f "$lib_dir/$base_name" ]; then
                install_name_tool -change "$lib" "@executable_path/lib/$base_name" "$mpv_bin" 2>/dev/null || true
              fi
            done

            # 修复每个 dylib 内部的依赖引用
            for dylib in "$lib_dir"/*.dylib; do
              [ -f "$dylib" ] || continue
              local dylib_name
              dylib_name=$(basename "$dylib")
              # 修复 dylib 的 install name
              install_name_tool -id "@executable_path/lib/$dylib_name" "$dylib" 2>/dev/null || true
              # 修复 dylib 内部引用的其他 dylib
              otool -L "$dylib" | awk '/\/opt\/homebrew|\/usr\/local/{print $1}' | while read -r dep; do
                local dep_name
                dep_name=$(basename "$dep")
                if [ -f "$lib_dir/$dep_name" ]; then
                  install_name_tool -change "$dep" "@executable_path/lib/$dep_name" "$dylib" 2>/dev/null || true
                fi
              done
            done

            echo "rpath fixup complete"
          }

          case "${{ matrix.os }}" in
            macos-latest)
              # macOS arm64
              brew install mpv
              MPV_BIN=$(brew --prefix mpv)/bin/mpv
              cp "$MPV_BIN" build/mpv/
              chmod +x build/mpv/mpv
              mkdir -p build/mpv/lib
              copy_dylibs_recursive "$MPV_BIN" "build/mpv/lib"
              fix_macos_rpaths "build/mpv/mpv" "build/mpv/lib"
              echo "mpv macOS arm64 binary prepared"
              echo "=== lib directory ==="
              ls -la build/mpv/lib/ | head -30
              ;;
            macos-14)
              # macOS x64
              brew install mpv
              MPV_BIN=$(brew --prefix mpv)/bin/mpv
              cp "$MPV_BIN" build/mpv/
              chmod +x build/mpv/mpv
              mkdir -p build/mpv/lib
              copy_dylibs_recursive "$MPV_BIN" "build/mpv/lib"
              fix_macos_rpaths "build/mpv/mpv" "build/mpv/lib"
              echo "mpv macOS x64 binary prepared"
              echo "=== lib directory ==="
              ls -la build/mpv/lib/ | head -30
              ;;
            ubuntu-22.04|ubuntu-22.04-arm)
              # Linux: apt install mpv 后提取二进制和依赖库
              sudo apt-get update
              sudo apt-get install -y mpv
              cp "$(which mpv)" build/mpv/
              chmod +x build/mpv/mpv
              mkdir -p build/mpv/lib
              ldd "$(which mpv)" | grep "=> /" | awk '{print $3}' | while read -r lib; do
                case "$(basename "$lib")" in
                  libc.so*|libm.so*|libpthread.so*|libdl.so*|librt.so*|ld-linux*) continue ;;
                esac
                cp "$lib" build/mpv/lib/ 2>/dev/null || true
              done
              echo "mpv Linux binary prepared"
              ;;
            windows-latest)
              # Windows: 从 zhongfly 预编译构建下载
              DOWNLOAD_URL=$(curl -sL "https://api.github.com/repos/zhongfly/mpv-winbuild/releases/latest" \
                | python3 -c "import sys,json; assets=json.load(sys.stdin).get('assets',[]); urls=[a['browser_download_url'] for a in assets if a['name'].startswith('mpv-x86_64-') and not 'debug' in a['name'] and not 'dev' in a['name'] and not 'v3' in a['name']]; print(urls[0] if urls else '')")
              if [ -z "$DOWNLOAD_URL" ]; then
                echo "ERROR: Failed to find mpv Windows download URL"
                exit 1
              fi
              echo "Downloading mpv from: $DOWNLOAD_URL"
              curl -L -o /tmp/mpv.7z "$DOWNLOAD_URL"
              # 先解压到临时目录
              7z x /tmp/mpv.7z -o"/tmp/mpv-extract" -y
              echo "=== extracted contents ==="
              find /tmp/mpv-extract -maxdepth 2 -type f -name "*.exe" -o -name "*.dll" | head -20
              # 把 mpv.exe 和所有 DLL 移到 build/mpv/（处理子目录情况）
              find /tmp/mpv-extract -name "mpv.exe" -exec cp {} build/mpv/ \;
              find /tmp/mpv-extract -name "*.dll" -exec cp {} build/mpv/ \;
              # 验证 mpv.exe 存在
              if [ ! -f "build/mpv/mpv.exe" ]; then
                echo "ERROR: mpv.exe not found after extraction"
                exit 1
              fi
              echo "mpv Windows binary prepared"
              ;;
          esac

          echo "=== mpv build directory ==="
          ls -la build/mpv/

      - name: Build desktop app
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          ELECTRON_BUILDER_BINARIES_MIRROR: https://github.com/electron-userland/electron-builder-binaries/releases/download/
        run: |
          pnpm exec vue-tsc --noEmit && pnpm exec vite build
          pnpm exec electron-builder ${{ matrix.electron_builder_args }} --publish never

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish Release Assets
    timeout-minutes: 20
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: find release-artifacts -maxdepth 2 -type f | sort

      - name: Extract changelog for current version
        id: changelog
        shell: bash
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"
          # 提取顶部声明（## 之前的内容，去掉标题行）
          HEADER=$(awk '/^## \[/ { exit } !/^# / { print }' CHANGELOG.md | sed '/^$/d')
          # 提取对应版本的内容
          VERSION_BODY=$(awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) found=1
              next
            }
            found { print }
          ' CHANGELOG.md)

          if [ -n "$HEADER" ] && [ -n "$VERSION_BODY" ]; then
            BODY=$(printf '%s\n\n%s' "$HEADER" "$VERSION_BODY")
          elif [ -n "$VERSION_BODY" ]; then
            BODY="$VERSION_BODY"
          else
            BODY="详见 CHANGELOG.md"
          fi

          {
            echo "BODY<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**
          body: ${{ steps.changelog.outputs.BODY }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Send Telegram Notification
    if: startsWith(github.ref, 'refs/tags/') && success()
    needs:
      - build
      - release
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build changelog
        shell: bash
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"
          CHANGELOG=$(awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) found=1
              next
            }
            found && NF { print }
          ' CHANGELOG.md \
            | sed 's/^### /\n📌 /' \
            | sed 's/^- /• /' \
            | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g; s/"/\&quot;/g' \
            | awk 'NR==1{printf "%s",$0;next}{printf "\n%s",$0}')

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="详见 CHANGELOG.md"
          fi

          {
            echo "CHANGELOG<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Build artifact links from release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY}"

          ASSETS=$(gh api "repos/${REPO}/releases/tags/${VERSION}" --jq '.assets[].name' 2>/dev/null || true)
          if [ -z "$ASSETS" ]; then
            echo "ARTIFACT_LINKS=无" >> "$GITHUB_ENV"
            exit 0
          fi

          LINKS=""
          while IFS= read -r filename; do
            escaped_name=$(printf '%s' "$filename" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g; s/"/\&quot;/g')
            link="https://github.com/${REPO}/releases/download/${VERSION}/${filename}"
            if [ -z "$LINKS" ]; then
              LINKS="• <a href=\"${link}\">${escaped_name}</a>"
            else
              LINKS="${LINKS}\n• <a href=\"${link}\">${escaped_name}</a>"
            fi
          done <<< "$ASSETS"

          {
            echo "ARTIFACT_LINKS<<EOF"
            printf '%b\n' "$LINKS"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Send Telegram message
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_TOPIC_ID: ${{ secrets.TELEGRAM_TOPIC_ID }}
        run: |
          set -e
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets are missing, skip notification."
            exit 0
          fi

          VERSION="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY}"

          printf -v MESSAGE '%s\n\n%s\n%s\n\n%s\n%s\n\n%s' \
            "🎉 <b>EchoMusic ${VERSION} 构建成功！</b>" \
            "📝 <b>更新内容：</b>" \
            "${CHANGELOG}" \
            "📦 <b>下载地址：</b>" \
            "${ARTIFACT_LINKS}" \
            "🔗 <a href=\"https://github.com/${REPO}/releases/tag/${VERSION}\">查看完整 Release</a>"

          PAYLOAD=$(jq -n \
            --arg chat_id "$TELEGRAM_CHAT_ID" \
            --arg text "$MESSAGE" \
            --arg parse_mode "HTML" \
            '{chat_id: $chat_id, text: $text, parse_mode: $parse_mode, disable_web_page_preview: true}')

          if [ -n "$TELEGRAM_TOPIC_ID" ]; then
            PAYLOAD=$(echo "$PAYLOAD" | jq --arg topic_id "$TELEGRAM_TOPIC_ID" '. + {message_thread_id: ($topic_id | tonumber)}')
          fi

          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
