[package]
name = "soundtouch-rs"
version = "0.1.0"
edition = "2024"

[dependencies]
thiserror = "2.0.18"
wide = "1.5.0"

[dev-dependencies]
anyhow = "1.0.102"
cpal = "0.18.1"
criterion = "0.8.2"
ffmpeg_audio = { path = "../ffmpeg-audio/crates/ffmpeg_audio" }
ringbuf = "0.5.0"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }

[[bench]]
name = "soundtouch_bench"
harness = false

[profile.bench]
debug = true

[lints.clippy]
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }

cast_precision_loss = "allow"
cast_possible_truncation = "allow"
cast_sign_loss = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
doc_markdown = "allow"
items_after_statements = "allow"
