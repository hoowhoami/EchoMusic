[package]
name = "soundtouch"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib"]

[package.metadata.wasm-pack.profile.release]
wasm-opt = ["-O", "--enable-simd", "--enable-bulk-memory", "--enable-nontrapping-float-to-int"]

[dependencies]
wasm-bindgen = "0.2"
soundtouch-rs = { git = "https://github.com/apoint123/soundtouch-rs.git", rev = "0948861b7019bc41efddb28e9b70d6facf7385e6" }
